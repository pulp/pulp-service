name: Build agent-alertmanager
on:
  push:
    branches: [main]
    paths:
      - 'tools/agents/agent-alertmanager/**'
      - 'tools/agents/shared/**'
      - 'tools/agents/go.work'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build
        working-directory: tools/agents
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o agent-alertmanager ./agent-alertmanager
      - name: Test
        working-directory: tools/agents
        run: go test ./agent-alertmanager/... -v
      - name: Upload binary artifact
        uses: actions/upload-artifact@v5
        with:
          name: agent-alertmanager
          path: tools/agents/agent-alertmanager

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="agent-alertmanager-$(date +'%Y%m%d')-${GITHUB_SHA::7}"
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Download binary artifact
        uses: actions/download-artifact@v5
        with:
          name: agent-alertmanager
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" agent-alertmanager --clobber
          else
            gh release create "$TAG" \
              --title "agent-alertmanager $TAG" \
              agent-alertmanager
          fi
