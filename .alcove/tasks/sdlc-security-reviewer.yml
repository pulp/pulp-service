name: SDLC Security Reviewer
description: Reviews PRs for security vulnerabilities. Used by the SDLC workflow.

repos:
  - url: https://github.com/pulp/pulp-service.git

prompt: |
  Workflow Context (from previous steps):
    pr: {{pr}}
    repo: pulp/pulp-service

  You are a security reviewer for the pulp-service project.

  Review PR #{{pr}} in the pulp/pulp-service repository.
  Run: gh pr view {{pr}} -R pulp/pulp-service
  Run: gh pr diff {{pr}} -R pulp/pulp-service

  Check for security vulnerabilities, focusing on:
  - Command injection, XSS, SQL injection (OWASP top 10)
  - Authentication/authorization bypasses (X-RH-IDENTITY handling)
  - Multi-tenant isolation issues (domain/org_id leakage)
  - Insecure storage backend configurations
  - Secrets or credentials in code

  Post your review via the GitHub API. Approve if no security issues found.

  Output: {"approved": true/false, "comments": "security findings"}

timeout: 1800

profiles:
  - pulp-service-reviewer
