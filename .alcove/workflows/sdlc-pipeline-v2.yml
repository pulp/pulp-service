name: Pulp Service SDLC Pipeline v2

trigger:
  github:
    events: [issues]
    actions: [labeled]
    labels: [agentic-sdlc-v2]
    repos: [pulp/pulp-service]
    delivery_mode: polling
  jira:
    labels: [agentic-sdlc-v2]

workflow:
  # Phase 1: Triage — assess issue feasibility and complexity.
  # Exits with failure if the issue is not automatable, halting the pipeline.
  - id: triage
    type: agent
    agent: Issue Triage
    inputs:
      issue_number: "{{trigger.issue_number}}"
      issue_title: "{{trigger.issue_title}}"
      issue_body: "{{trigger.issue_body}}"
      issue_url: "{{trigger.issue_url}}"
      repo: "pulp/pulp-service"
    outputs: [complexity, target_area, candidate_files, approach, risks, automatable, reviewers_needed]

  # Phase 2: Plan — create implementation plan from triage output.
  # Condition ensures triage explicitly flagged the issue as automatable.
  - id: plan
    type: agent
    agent: Implementation Planner v2
    depends: "triage.Succeeded"
    condition: "steps.triage.outputs.automatable == true"
    inputs:
      issue_number: "{{trigger.issue_number}}"
      issue_title: "{{trigger.issue_title}}"
      issue_body: "{{trigger.issue_body}}"
      repo: "pulp/pulp-service"
      triage_output: "{{steps.triage.outputs}}"
    outputs: [plan, verification_commands, reviewers_needed]

  # Phase 3: Implement — write code following the plan.
  - id: implement
    type: agent
    agent: Pulp Developer
    depends: "plan.Succeeded"
    max_retries: 3
    inputs:
      branch: "issue-{{trigger.issue_number}}-fix"
      issue_number: "{{trigger.issue_number}}"
      repo: "pulp/pulp-service"
      issue_title: "{{trigger.issue_title}}"
      issue_body: "{{trigger.issue_body}}"
      issue_url: "{{trigger.issue_url}}"
      plan: "{{steps.plan.outputs.plan}}"
    outputs: [summary]

  # Phase 4: Verify — run tests, check acceptance criteria, review code.
  # Re-enters after successful patch or revision.
  - id: verify
    type: agent
    agent: Implementation Verifier
    depends: "implement.Succeeded || patch.Succeeded || revision.Succeeded"
    max_iterations: 3
    inputs:
      issue_number: "{{trigger.issue_number}}"
      repo: "pulp/pulp-service"
      branch: "{{steps.implement.inputs.branch}}"
      plan: "{{steps.plan.outputs.plan}}"
      implement_summary: "{{steps.implement.outputs.summary}}"
      verification_commands: "{{steps.plan.outputs.verification_commands}}"
    outputs: [verdict, fixes_required, code_issues]

  # Phase 4b: Patch — surgical fixes for verify failures (< 50 lines each).
  # Exits with failure if fix is too complex, halting the verify/patch loop.
  - id: patch
    type: agent
    agent: Code Patcher
    depends: "verify.Failed"
    max_iterations: 2
    inputs:
      branch: "{{steps.implement.inputs.branch}}"
      repo: "pulp/pulp-service"
      fixes_required: "{{steps.verify.outputs.fixes_required}}"
      code_issues: "{{steps.verify.outputs.code_issues}}"
    outputs: [fixes_applied, too_complex, too_complex_reason]

  # Phase 5: Review — parallel specialist reviewers.
  # Reviewers exit non-zero when rejecting, mapping to Failed status.
  - id: review-django
    type: agent
    agent: Django Specialist Reviewer
    depends: "verify.Succeeded"
    inputs:
      branch: "{{steps.implement.inputs.branch}}"
      repo: "pulp/pulp-service"
      plan: "{{steps.plan.outputs.plan}}"
      implement_summary: "{{steps.implement.outputs.summary}}"
    outputs: [approved, comments, issues]

  - id: review-security
    type: agent
    agent: Security Reviewer
    depends: "verify.Succeeded"
    inputs:
      branch: "{{steps.implement.inputs.branch}}"
      repo: "pulp/pulp-service"
      plan: "{{steps.plan.outputs.plan}}"
      implement_summary: "{{steps.implement.outputs.summary}}"
    outputs: [approved, comments, issues]

  # Phase 5b: Revision — address review feedback, then re-verify and re-review.
  - id: revision
    type: agent
    agent: Pulp Developer
    depends: "review-django.Failed || review-security.Failed"
    max_iterations: 2
    inputs:
      branch: "{{steps.implement.inputs.branch}}"
      issue_number: "{{trigger.issue_number}}"
      repo: "pulp/pulp-service"
      issue_title: "{{trigger.issue_title}}"
      issue_body: "{{trigger.issue_body}}"
      issue_url: "{{trigger.issue_url}}"
      plan: "{{steps.plan.outputs.plan}}"
      code_feedback: "{{steps.review-django.outputs.comments}}\n---\n{{steps.review-security.outputs.comments}}"
    outputs: [summary]

  # Phase 6: Submit — create draft PR (human merges after review).
  # Condition ensures both reviewers explicitly approved.
  - id: create-pr
    type: bridge
    action: create-merge-request
    depends: "review-django.Succeeded && review-security.Succeeded"
    condition: "steps.review-django.outputs.approved == true && steps.review-security.outputs.approved == true"
    inputs:
      repo: pulp/pulp-service
      branch: "{{steps.implement.inputs.branch}}"
      title: "Fix #{{trigger.issue_number}}: {{trigger.issue_title}}"
      base: main
      draft: true
      body: "Closes {{trigger.issue_url}}\n\n## Summary\n\n{{steps.implement.outputs.summary}}\n\n## Review Notes\n\n### Django Review\n{{steps.review-django.outputs.comments}}\n\n### Security Review\n{{steps.review-security.outputs.comments}}"

  # Phase 7: CI — wait for checks, fix failures if needed.
  # When max_iterations exhausts, the step is marked failed and the pipeline halts.
  - id: await-ci
    type: bridge
    action: await-checks
    depends: "create-pr.Succeeded || ci-fix.Succeeded"
    max_iterations: 4
    inputs:
      repo: pulp/pulp-service
      pr: "{{steps.create-pr.outputs.pr_number}}"

  - id: ci-fix
    type: agent
    agent: Pulp Developer
    depends: "await-ci.Failed"
    max_iterations: 3
    inputs:
      branch: "{{steps.implement.inputs.branch}}"
      issue_number: "{{trigger.issue_number}}"
      repo: "pulp/pulp-service"
      issue_title: "{{trigger.issue_title}}"
      issue_body: "{{trigger.issue_body}}"
      issue_url: "{{trigger.issue_url}}"
      plan: "{{steps.plan.outputs.plan}}"
      ci_logs: "{{steps.await-ci.outputs.failure_logs}}"
    outputs: [summary]
