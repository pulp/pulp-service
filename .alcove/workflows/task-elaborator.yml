name: Task Elaborator Pipeline
trigger:
  jira:
    projects: [PULP]
    labels: [plan-approved]

workflow:
  # Step 1: Get the epic details
  - id: get_epic
    type: bridge
    action: jira-get-issue
    inputs:
      issue_key: "{{trigger.issue_key}}"
    outputs: [issue_type, summary]

  # Step 2: Not an epic — comment and stop
  - id: not_epic
    type: bridge
    action: jira-add-comment
    depends: "get_epic.Succeeded"
    condition: "steps.get_epic.outputs.issue_type != 'Epic'"
    inputs:
      issue_key: "{{trigger.issue_key}}"
      body: "Task elaboration skipped — this is not an Epic."

  # Step 3: Find the plan task under this epic
  - id: find_plan
    type: bridge
    action: jira-search-issues
    depends: "get_epic.Succeeded"
    condition: "steps.get_epic.outputs.issue_type == 'Epic'"
    inputs:
      jql: "parent = {{trigger.issue_key}} AND summary ~ 'Implementation Plan'"
      max_results: 1
    outputs: [issue_keys]

  # Step 4: No plan task found — comment and stop
  - id: no_plan
    type: bridge
    action: jira-add-comment
    depends: "find_plan.Succeeded"
    condition: "steps.find_plan.outputs.issue_keys == null"
    inputs:
      issue_key: "{{trigger.issue_key}}"
      body: "Task elaboration failed — no Implementation Plan task found. Add needs-planning label first."

  # Step 5: Run the Task Elaborator agent
  # NOTE: jira-get-issue does not return `description` (alcove-ai/alcove#773).
  # We pass the plan task keys to the agent, which fetches the description itself
  # using its Jira API tools. Template array indexing (issue_keys[0]) is not
  # supported, so we pass the full issue_keys array — the agent picks the first.
  - id: elaborate
    type: agent
    agent: Task Elaborator
    depends: "find_plan.Succeeded"
    condition: "steps.find_plan.outputs.issue_keys != null"
    direct_outbound: true
    credentials:
      GIT_SSL_NO_VERIFY: git-ssl-no-verify
    inputs:
      epic_key: "{{trigger.issue_key}}"
      epic_url: "{{trigger.issue_url}}"
      plan_task_keys: "{{steps.find_plan.outputs.issue_keys}}"
    outputs: [tasks_created, ready_tasks]

  # Step 6: Add labels to the epic
  - id: label_epic
    type: bridge
    action: jira-update-issue
    depends: "elaborate.Succeeded"
    inputs:
      issue_key: "{{trigger.issue_key}}"
      add_labels: ["has-plan", "executing"]
      remove_labels: ["plan-approved"]

  # Step 7: Notify the epic
  - id: notify
    type: bridge
    action: jira-add-comment
    depends: "label_epic.Succeeded"
    inputs:
      issue_key: "{{trigger.issue_key}}"
      body: "Tasks created: {{steps.elaborate.outputs.tasks_created}}. Ready for execution: {{steps.elaborate.outputs.ready_tasks}}."

  # Step 8: Failure handling
  - id: post_failure
    type: bridge
    action: jira-add-comment
    depends: "get_epic.Failed || find_plan.Failed || elaborate.Failed || label_epic.Failed"
    inputs:
      issue_key: "{{trigger.issue_key}}"
      body: "Task elaboration failed. Check workflow logs for details."
