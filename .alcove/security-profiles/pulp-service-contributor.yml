name: pulp-service-contributor
display_name: Pulp Service Contributor
description: Clone pulp/pulp-service, push branches, and create PRs
tools:
  github:
    rules:
      - repos: ["pulp/pulp-service"]
        operations:
          - clone
          - read_prs
          - read_issues
          - read_contents
          - read_commits
          - read_branches
          - read_git
          - push_branch
          - create_pr
          - create_pr_draft
          - create_comment
