name: pulp-service-planner
display_name: Pulp Service Planner
description: Read-only code access plus issue reading, commenting, and editing on pulp/pulp-service
tools:
  github:
    rules:
      - repos: ["pulp/pulp-service"]
        operations:
          - clone
          - read_issues
          - read_prs
          - read_contents
          - read_actions
          - read_releases
          - read_commits
          - read_branches
          - read_git
          - create_comment
          - update_issue
