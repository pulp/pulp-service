name: pulp-service-reader
display_name: Pulp Service Reader
description: Read-only access to pulp/pulp-service (code, issues, PRs) and hosted-pulp/pulp-docs
tools:
  github:
    rules:
      - repos: ["pulp/pulp-service"]
        operations:
          - clone
          - read_prs
          - read_issues
          - read_contents
          - read_actions
          - read_commits
          - read_branches
  gitlab:
    rules:
      - repos: ["hosted-pulp/pulp-docs"]
        operations:
          - clone
