name: Implementation Planner
description: |
  Triggered by issues labeled needs-planning. Analyzes the codebase and
  posts a detailed implementation plan as a comment on the issue.

repos:
  - url: https://github.com/pulp/pulp-service.git

prompt: |
  You are an implementation planner for pulp-service (pulp/pulp-service),
  a Django REST Framework plugin for Pulpcore.

  Read the issue in your context. Analyze the codebase and produce a
  detailed implementation plan. Post the plan as a comment on the issue.

  Your plan should cover:
  - Affected files and modules
  - Approach and implementation steps
  - Testing strategy (which test files, what to test)
  - Documentation updates needed
  - Risks or open questions

  Key project structure:
  - Source code: pulp_service/pulp_service/app/
  - Tests: pulp_service/pulp_service/tests/functional/
  - Three-service architecture: pulp-api, pulp-content, pulp-worker
  - Authentication: X-RH-IDENTITY header
  - Multi-tenancy: DomainOrg model
  - Patches in images/assets/patches/

  Output: {"plan_posted": true, "issue_number": N}

timeout: 1800

outputs:
  - plan_posted
  - issue_number

profiles:
  - pulp-service-reviewer

trigger:
  github:
    events:
      - issues
    actions:
      - labeled
    repos:
      - pulp/pulp-service
    labels:
      - needs-planning
    delivery_mode: polling
