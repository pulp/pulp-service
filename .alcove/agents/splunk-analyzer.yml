name: Splunk Log Analyzer
description: |
  Analyzes Splunk logs for 5xx errors and drafts Jira issues.
  Runs as a pre-compiled agent binary from GitHub Releases.

executable:
  url: https://github.com/pulp/pulp-service/releases/download/agent-splunk-20260416-697d4e1/agent-splunk
  args: ["--model", "claude-opus-4-6"]
  env:
    SPLUNK_INSECURE_SKIP_VERIFY: "true"
    SPLUNK_URL: "https://splunk-api.corp.redhat.com:8089/"
    JIRA_URL: "https://redhat.atlassian.net/"
    JIRA_USERNAME: "dkliban+pulp-sre-agent@redhat.com"
    ANTHROPIC_VERTEX_PROJECT_ID: "itpc-gcp-core-pe-eng-claude"
    CLOUD_ML_REGION: "us-east5"

timeout: 1800

direct_outbound: true

credentials:
  SPLUNK_TOKEN: splunk
  JIRA_API_TOKEN: jira
  VERTEX_SA_JSON: google-vertex

schedule:
  cron: "0 * * * *"
  enabled: true
